# Neo4j and Qdrant are NOT started here: this service uses the real Java BE stack's
# shared containers (stylemind-neo4j, stylemind-qdrant from BE/docker-compose.infra.yml),
# which must already be running. This compose file only owns Postgres, which stores
# ai_stylist's own chat sessions/messages (a separate DB from Java's business schemas)
# and is remapped to host port 5433 to avoid colliding with Java's shared postgres on 5432.
services:
  postgres:
    image: postgres:16
    container_name: ai_stylist_postgres
    environment:
      POSTGRES_DB: ai_stylist
      POSTGRES_USER: stylist
      POSTGRES_PASSWORD: stylist123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylist -d ai_stylist"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
